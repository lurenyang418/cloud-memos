name: Release production

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  release:
    name: Verify and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://cloud-memos.lurenyang-003.workers.dev

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH."
            exit 1
          fi
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare local test secrets
        run: cp .dev.vars.example .dev.vars

      - name: Run quality checks
        run: pnpm check

      - name: Run browser tests
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:e2e

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Apply production migrations
        run: pnpm exec wrangler d1 migrations apply cloud-memos --remote --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy production Worker
        run: pnpm deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test production
        run: |
          node --input-type=module <<'EOF'
          const base = "https://cloud-memos.lurenyang-003.workers.dev";
          const [home, sessionResponse, publicMemos] = await Promise.all([
            fetch(`${base}/`),
            fetch(`${base}/api/v1/session`),
            fetch(`${base}/api/v1/public/memos`),
          ]);

          for (const [name, response] of [
            ["home", home],
            ["session", sessionResponse],
            ["public memos", publicMemos],
          ]) {
            if (!response.ok) throw new Error(`${name} returned ${response.status}`);
          }

          const session = await sessionResponse.json();
          if (session.setupRequired !== false) {
            throw new Error("Production unexpectedly requires bootstrap setup");
          }
          EOF

      - name: Write release summary
        run: |
          echo "### Production release" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$GITHUB_REF_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$GITHUB_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: https://cloud-memos.lurenyang-003.workers.dev" >> "$GITHUB_STEP_SUMMARY"
